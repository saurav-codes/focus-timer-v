<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Focus Timer{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">Focus Timer</a>
            <ul class="flex space-x-4">
                {% if user.is_authenticated %}
                    <li><a href="{% url 'start_session' %}" class="hover:underline">Start Session</a></li>
                    <li><a href="#" class="hover:underline">Dashboard</a></li>
                    <li><a href="{% url 'account_logout' %}" class="hover:underline">Logout</a></li>
                {% else %}
                    <li><a href="{% url 'account_login' %}" class="hover:underline">Login</a></li>
                    <li><a href="{% url 'account_signup' %}" class="hover:underline">Sign Up</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main class="container mx-auto flex-grow p-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-200 text-center p-4 mt-8">
        <p>&copy; 2024 Focus Timer. All rights reserved.</p>
    </footer>

    {% block extra_body %}{% endblock %}
</body>
</html>
