{% extends "base.html" %}
{% load static %}
{% block content %}
  <style>
    :root {
        --primary-color: #4a90e2;
        --secondary-color: #f5f5f5;
        --text-color: #333;
        --accent-color: #e74c3c;
    }
    body {
        font-family: 'Arial', sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background-color: var(--secondary-color);
        margin: 0;
        padding: 20px;
    }
    h1 {
        color: var(--primary-color);
        text-align: center;
        margin-bottom: 20px;
    }
    #timer-display {
        text-align: center;
    }
    button {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 10px;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #3a7bd5;
    }
    button:last-child {
        background-color: var(--accent-color);
    }
    button:last-child:hover {
        background-color: #c0392b;
    }
    #remaining-time {
        font-size: 2.5em;
        font-weight: bold;
        margin: 20px 0;
        color: var(--primary-color);
    }
    #current-cycle, #timer-state {
        font-size: 1.2em;
        margin: 10px 0;
    }
    #focus-cycles-list {
        margin-top: 20px;
        text-align: left;
    }
    #focus-cycles-list div {
        padding: 5px 0;
        border-bottom: 1px solid #eee;
    }
    #focus-cycles-list div:last-child {
        border-bottom: none;
    }
</style>
    <div class="container">
        <h1>Focus Session</h1>
        <div id="session-id" data-session-id="{{ focus_session.session_id }}"></div>
        <div id="timer-display">
            <button onclick="focusSessionManager.toggleTimer()">Resume/Pause</button>
            <button onclick="focusSessionManager.stopTimer()">Stop</button>
            <div id="remaining-time"></div>
            <div id="current-cycle"></div>
            <div id="timer-state"></div>
            <div id="focus-cycles-list"></div>
        </div>
    </div>
    <script src="{% static 'js/focus_session.js' %}" defer></script>
    {% endblock content %}

    {% block extra_js %}
    {% endblock extra_js %}
