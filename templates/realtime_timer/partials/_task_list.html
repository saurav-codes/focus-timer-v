<!-- templates/realtime_timer/partials/_task_list.html -->

<style>
  .task-list {
    background-color: #1e2a3a;
    border-radius: 8px;
    padding: 1rem;
  }
  .task-form {
    margin-bottom: 1rem;
    display: flex;
  }
  .task-input {
    flex-grow: 1;
    background-color: #2a3a4a;
    border: 1px solid #3a4a5a;
    color: #fff;
    padding: 0.5rem;
    margin-right: 0.5rem;
    border-radius: 4px;
  }
  .task-submit {
    background-color: #4a69bd;
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .task-item {
    display: flex;
    align-items: center;
    padding: 0.5rem;
    border-radius: 4px;
    transition: background-color 0.3s ease;
  }
  .task-item:hover {
    background-color: rgba(255, 255, 255, 0.1);
  }
  .task-checkbox {
    margin-right: 0.5rem;
    cursor: pointer;
  }
  .task-description {
    flex-grow: 1;
    color: #fff;
  }
  .task-completed .task-description {
    text-decoration: line-through;
    color: #888;
  }
  .delete-task-btn {
    opacity: 0;
    transition: opacity 0.3s ease;
    background: none;
    border: none;
    color: #ff4d4d;
    cursor: pointer;
    padding: 0.25rem;
  }
  .task-item:hover .delete-task-btn {
    opacity: 1;
  }
</style>

<div hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' id="taskList" class="task-list">
  <form hx-post="{% url 'realtime_timer:create_task' %}"
        hx-target="#taskList"
        hx-swap="outerHTML"
        hx-trigger="submit, taskAdded from:body"
        class="task-form">
    <input type="text" name="description" placeholder="New task" required class="task-input" id="taskInput">
    <button type="submit" class="task-submit">Add</button>
  </form>
  <div id="taskItems">
    {% for task in tasks %}
      <div class="task-item {% if task.is_completed %}task-completed{% endif %}">
        <input type="checkbox" class="task-checkbox" {% if task.is_completed %}checked{% endif %}
               hx-post="{% url 'realtime_timer:toggle_task' task_id=task.id %}"
               hx-target="#taskList"
               hx-swap="outerHTML"
               hx-trigger="change">
        <span class="task-description">{{ task.description }}</span>
        <button class="delete-task-btn"
                hx-post="{% url 'realtime_timer:delete_task' task_id=task.id %}"
                hx-target="#taskList"
                hx-swap="outerHTML">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    {% empty %}
      <p class="text-gray-400">No tasks yet.</p>
    {% endfor %}
  </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-50"></div>

<script>
function showToast(message, type = 'success') {
  const toastContainer = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `flex items-center w-full max-w-xs p-4 mb-4 text-gray-500 bg-white rounded-lg shadow dark:text-gray-400 dark:bg-gray-800 transition-opacity duration-300 ease-in-out opacity-0`;
  toast.setAttribute('role', 'alert');

  let iconColor, bgColor, icon;
  switch (type) {
    case 'success':
      iconColor = 'text-green-500';
      bgColor = 'bg-green-100';
      icon = `<path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>`;
      break;
    // Add cases for 'danger' and 'warning' if needed
  }

  toast.innerHTML = `
    <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 ${iconColor} ${bgColor} rounded-lg dark:bg-green-800 dark:text-green-200">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        ${icon}
      </svg>
      <span class="sr-only">Check icon</span>
    </div>
    <div class="ms-3 text-sm font-normal">${message}</div>
    <button type="button" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:text-gray-500 dark:hover:text-white dark:bg-gray-800 dark:hover:bg-gray-700" aria-label="Close">
      <span class="sr-only">Close</span>
      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
      </svg>
    </button>
  `;

  toastContainer.appendChild(toast);

  // Fade in
  setTimeout(() => {
    toast.classList.remove('opacity-0');
    toast.classList.add('opacity-100');
  }, 10);

  // Auto-remove after 3 seconds
  setTimeout(() => {
    toast.classList.remove('opacity-100');
    toast.classList.add('opacity-0');
    setTimeout(() => {
      toastContainer.removeChild(toast);
    }, 300);
  }, 3000);

  // Close button functionality
  const closeButton = toast.querySelector('button');
  closeButton.addEventListener('click', () => {
    toast.classList.remove('opacity-100');
    toast.classList.add('opacity-0');
    setTimeout(() => {
      toastContainer.removeChild(toast);
    }, 300);
  });
}

// Check if there's a toast message from the backend and show it
{% if toast_message %}
  showToast("{{ toast_message }}", "success");
{% endif %}

// Focus the input field after adding a task
document.body.addEventListener('htmx:afterSwap', function(event) {
  if (event.detail.target.id === 'taskList') {
    const taskInput = document.getElementById('taskInput');
    if (taskInput) {
      taskInput.focus();
      // Trigger a custom event to re-focus the input field
      document.body.dispatchEvent(new Event('taskAdded'));
    }
  }
});
</script>
