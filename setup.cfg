[isort]
line_length = 120
multi_line_output = 3
skip = env/, task_*
skip_glob = **/migrations/*.py
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true

[flake8]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,.venv
ignore = E402, E203, E266, E501, W503, F401, F403, F841, E722, E713, F821, I005, I003, F402, F601, F811, F405, I001, I004, E231
